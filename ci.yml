name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: api

      - name: Lint
        run: npm run lint
        working-directory: api

      - name: Test
        run: npm test
        working-directory: api

      - name: Build Docker image
        run: docker build -t myservice:${{ github.sha }} .
        working-directory: api